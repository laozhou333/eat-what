<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>今天吃什么？</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;background:#000;color:#f5f5f7;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

    /* ═══ Apple Layout ═══ */
    .page{max-width:480px;margin:0 auto;padding:0 24px;min-height:100vh;display:flex;flex-direction:column}

    /* ═══ Nav ═══ */
    .nav{position:sticky;top:0;z-index:50;backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);background:rgba(0,0,0,0.72);border-bottom:0.5px solid rgba(255,255,255,0.08);margin:0 -24px;padding:0 24px}
    .nav-inner{height:48px;display:flex;align-items:center;justify-content:space-between}
    .nav-title{font-size:17px;font-weight:600;letter-spacing:-0.4px}
    .nav-mode{font-size:13px;color:#86868b;cursor:pointer;transition:color 0.3s}
    .nav-mode:hover{color:#f5f5f7}
    .nav-mode.diet-on{color:#30d158;font-weight:500}

    /* ═══ Hero ═══ */
    .hero{padding:48px 0 32px;text-align:center}
    .hero h1{font-size:40px;font-weight:700;letter-spacing:-0.5px;line-height:1.1}
    .hero h1 .gradient{background:linear-gradient(90deg,#ff375f,#ff6723,#ffd60a);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .hero p{font-size:17px;color:#86868b;margin-top:8px;font-weight:300;letter-spacing:-0.4px;line-height:1.47}

    /* ═══ Meal Selector — Apple Segmented Control ═══ */
    .segment{display:flex;background:rgba(255,255,255,0.08);border-radius:9px;padding:2px;margin:24px 0}
    .segment-btn{flex:1;padding:8px 0;text-align:center;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.25s cubic-bezier(0.25,0.1,0.25,1);color:#86868b;letter-spacing:-0.08px;position:relative}
    .segment-btn.active{background:rgba(255,255,255,0.14);color:#f5f5f7;box-shadow:0 0.5px 4px rgba(0,0,0,0.3),0 0.5px 1px rgba(0,0,0,0.2)}
    .segment-btn .s-emoji{font-size:15px;margin-right:4px}

    /* ═══ Slot Machine ═══ */
    .slot-container{margin:32px 0;perspective:600px}
    .slot-frame{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.1);border-radius:20px;padding:32px 24px;position:relative;overflow:hidden}
    .slot-frame::before{content:'';position:absolute;top:0;left:0;right:0;height:60px;background:linear-gradient(to bottom,rgba(0,0,0,0.9),transparent);z-index:2;pointer-events:none;border-radius:20px 20px 0 0}
    .slot-frame::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);z-index:2;pointer-events:none;border-radius:0 0 20px 20px}
    .slot-window{height:280px;overflow:hidden;position:relative}
    .slot-highlight{position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);height:72px;background:rgba(255,255,255,0.04);border-top:0.5px solid rgba(255,255,255,0.08);border-bottom:0.5px solid rgba(255,255,255,0.08);z-index:1;pointer-events:none}
    .slot-reel{transition:transform 3s cubic-bezier(0.23,1,0.32,1)}
    .slot-item{height:72px;display:flex;align-items:center;padding:0 20px;gap:16px}
    .slot-item .item-emoji{font-size:36px;width:48px;text-align:center;flex-shrink:0}
    .slot-item .item-info{flex:1;min-width:0}
    .slot-item .item-name{font-size:19px;font-weight:600;letter-spacing:-0.4px;color:#f5f5f7}
    .slot-item .item-meta{font-size:13px;color:#86868b;margin-top:1px;letter-spacing:-0.08px}

    /* ═══ Button — Apple Style ═══ */
    .action-btn{width:100%;padding:16px;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;letter-spacing:-0.4px;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
    .action-btn.primary{background:#0071e3;color:#fff}
    .action-btn.primary:hover{background:#0077ed}
    .action-btn.primary:active{transform:scale(0.98);background:#006edb}
    .action-btn.spinning{background:#1d1d1f;color:#86868b;pointer-events:none}

    /* ═══ Result Card ═══ */
    .result{margin:24px 0;opacity:0;transform:translateY(16px) scale(0.97);transition:all 0.5s cubic-bezier(0.25,0.1,0.25,1)}
    .result.show{opacity:1;transform:translateY(0) scale(1)}
    .result-card{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.1);border-radius:20px;padding:28px;text-align:center}
    .result-emoji{font-size:56px;margin-bottom:12px}
    .result-name{font-size:28px;font-weight:700;letter-spacing:-0.5px;line-height:1.14}
    .result-desc{font-size:15px;color:#86868b;margin-top:6px;font-weight:300}
    .result-pills{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
    .pill{font-size:12px;padding:5px 12px;border-radius:980px;background:rgba(255,255,255,0.06);color:#86868b;letter-spacing:-0.08px}
    .pill.green{color:#30d158;background:rgba(48,209,88,0.1)}

    /* ═══ Again / Share Row ═══ */
    .action-row{display:flex;gap:12px;margin-top:16px}
    .action-row .action-btn{flex:1}
    .action-btn.secondary{background:rgba(255,255,255,0.08);color:#f5f5f7}
    .action-btn.secondary:hover{background:rgba(255,255,255,0.12)}
    .action-btn.secondary:active{transform:scale(0.98)}

    /* ═══ History ═══ */
    .history{margin-top:auto;padding:24px 0 32px}
    .history-title{font-size:13px;color:#86868b;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:12px}
    .history-scroll{display:flex;gap:8px;overflow-x:auto;margin:0 -24px;padding:0 24px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .history-scroll::-webkit-scrollbar{display:none}
    .history-chip{flex-shrink:0;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.08);border-radius:980px;padding:8px 16px 8px 10px}
    .history-chip .chip-emoji{font-size:20px}
    .history-chip .chip-name{font-size:13px;color:#86868b;white-space:nowrap}

    /* ═══ Footer ═══ */
    .footer{text-align:center;padding:12px 0 env(safe-area-inset-bottom,20px);font-size:12px;color:#48484a;letter-spacing:-0.08px}

    /* ═══ Diet badge ═══ */
    .diet-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(48,209,88,0.1);color:#30d158;font-size:12px;font-weight:500;padding:4px 10px;border-radius:980px;margin-top:8px;opacity:0;height:0;overflow:hidden;transition:all 0.3s}
    .diet-badge.show{opacity:1;height:auto;margin-top:8px}

    /* ═══ Responsive ═══ */
    @media(max-width:390px){
      .hero h1{font-size:34px}
      .slot-item .item-name{font-size:17px}
    }
  </style>
</head>
<body>

  <div class="page">
    <!-- Nav -->
    <div class="nav">
      <div class="nav-inner">
        <span class="nav-title">今天吃什么</span>
        <span class="nav-mode" id="dietBtn" onclick="toggleDiet()">减肥模式</span>
      </div>
    </div>

    <!-- Hero -->
    <div class="hero">
      <h1>别想了<br><span class="gradient">转一下就好</span></h1>
      <p>选择困难？交给命运。</p>
      <div class="diet-badge" id="dietBadge">🥗 低卡模式已开启</div>
    </div>

    <!-- Segment -->
    <div class="segment" id="segment">
      <div class="segment-btn active" data-meal="lunch" onclick="switchMeal('lunch')"><span class="s-emoji">☀️</span>午餐</div>
      <div class="segment-btn" data-meal="dinner" onclick="switchMeal('dinner')"><span class="s-emoji">🌙</span>晚餐</div>
      <div class="segment-btn" data-meal="snack" onclick="switchMeal('snack')"><span class="s-emoji">🍪</span>下午茶</div>
    </div>

    <!-- Slot Machine -->
    <div class="slot-container">
      <div class="slot-frame">
        <div class="slot-highlight"></div>
        <div class="slot-window">
          <div class="slot-reel" id="reel"></div>
        </div>
      </div>
    </div>

    <!-- Spin Button -->
    <button class="action-btn primary" id="spinBtn" onclick="spin()">开始</button>

    <!-- Result -->
    <div class="result" id="result">
      <div class="result-card">
        <div class="result-emoji" id="resEmoji"></div>
        <div class="result-name" id="resName"></div>
        <div class="result-desc" id="resDesc"></div>
        <div class="result-pills" id="resPills"></div>
      </div>
      <div class="action-row">
        <button class="action-btn secondary" onclick="spin()">换一个</button>
        <button class="action-btn secondary" onclick="share()">分享</button>
      </div>
    </div>

    <!-- History -->
    <div class="history" id="historyBox" style="display:none">
      <div class="history-title">最近</div>
      <div class="history-scroll" id="historyList"></div>
    </div>

    <div class="footer">Asher · Claude Code · 2026</div>
  </div>

  <script>
    var foods={lunch:{normal:[
      {name:'红烧牛肉面',emoji:'🍜',cal:'650kcal',tags:['面食','热腾腾']},
      {name:'黄焖鸡米饭',emoji:'🍗',cal:'700kcal',tags:['米饭','下饭']},
      {name:'麻辣香锅',emoji:'🌶️',cal:'800kcal',tags:['重口味','解馋']},
      {name:'日式拉面',emoji:'🍥',cal:'600kcal',tags:['日料','汤面']},
      {name:'炒饭套餐',emoji:'🍚',cal:'650kcal',tags:['快餐','经典']},
      {name:'水煮鱼',emoji:'🐟',cal:'550kcal',tags:['川菜','鲜辣']},
      {name:'宫保鸡丁',emoji:'🥜',cal:'580kcal',tags:['川菜','经典']},
      {name:'韩式石锅拌饭',emoji:'🍲',cal:'620kcal',tags:['韩餐','营养']},
      {name:'烤肉饭',emoji:'🥩',cal:'750kcal',tags:['肉食','满足']},
      {name:'兰州拉面',emoji:'🍜',cal:'500kcal',tags:['面食','清真']},
      {name:'咖喱鸡饭',emoji:'🍛',cal:'680kcal',tags:['东南亚','香浓']},
      {name:'肯德基/麦当劳',emoji:'🍔',cal:'900kcal',tags:['快餐','罪恶']}
    ],diet:[
      {name:'轻食沙拉',emoji:'🥗',cal:'350kcal',tags:['低卡','高纤维']},
      {name:'鸡胸肉便当',emoji:'🍱',cal:'420kcal',tags:['高蛋白','增肌']},
      {name:'荞麦面',emoji:'🍝',cal:'380kcal',tags:['粗粮','饱腹']},
      {name:'蔬菜鸡汤',emoji:'🍲',cal:'280kcal',tags:['暖胃','低脂']},
      {name:'三文鱼牛油果碗',emoji:'🥑',cal:'450kcal',tags:['优质脂肪','Omega3']},
      {name:'糙米饭+清蒸鱼',emoji:'🐟',cal:'400kcal',tags:['清淡','营养']},
      {name:'全麦三明治',emoji:'🥪',cal:'380kcal',tags:['全麦','方便']},
      {name:'越南米粉',emoji:'🍜',cal:'360kcal',tags:['低脂','清爽']}
    ]},dinner:{normal:[
      {name:'火锅',emoji:'🫕',cal:'1000kcal',tags:['聚餐','快乐']},
      {name:'烧烤',emoji:'🍢',cal:'800kcal',tags:['夜宵','社交']},
      {name:'日式居酒屋',emoji:'🍶',cal:'700kcal',tags:['日料','小酌']},
      {name:'西餐牛排',emoji:'🥩',cal:'850kcal',tags:['浪漫','仪式感']},
      {name:'寿司',emoji:'🍣',cal:'600kcal',tags:['日料','精致']},
      {name:'小龙虾',emoji:'🦞',cal:'750kcal',tags:['宵夜','季节']},
      {name:'粤式茶餐厅',emoji:'🥟',cal:'650kcal',tags:['港风','丰富']},
      {name:'泰国菜',emoji:'🍛',cal:'680kcal',tags:['东南亚','酸辣']},
      {name:'意大利面',emoji:'🍝',cal:'700kcal',tags:['西餐','奶香']},
      {name:'韩式烤肉',emoji:'🥓',cal:'850kcal',tags:['韩餐','社交']},
      {name:'北京烤鸭',emoji:'🦆',cal:'780kcal',tags:['中餐','经典']},
      {name:'川菜馆子',emoji:'🌶️',cal:'750kcal',tags:['川菜','痛快']}
    ],diet:[
      {name:'清蒸鲈鱼+蔬菜',emoji:'🐟',cal:'380kcal',tags:['低脂','高蛋白']},
      {name:'日式刺身定食',emoji:'🍣',cal:'400kcal',tags:['生鲜','低卡']},
      {name:'蔬菜锅（清汤）',emoji:'🫕',cal:'350kcal',tags:['火锅','低卡']},
      {name:'鸡胸肉沙拉',emoji:'🥗',cal:'320kcal',tags:['增肌','饱腹']},
      {name:'虾仁炒西兰花',emoji:'🦐',cal:'300kcal',tags:['低脂','快手']},
      {name:'豆腐煲',emoji:'🍲',cal:'280kcal',tags:['植物蛋白','暖胃']},
      {name:'烤鸡腿+蔬菜',emoji:'🍗',cal:'420kcal',tags:['高蛋白','满足']},
      {name:'牛肉蔬菜汤',emoji:'🥣',cal:'350kcal',tags:['暖身','营养']}
    ]},snack:{normal:[
      {name:'奶茶',emoji:'🧋',cal:'500kcal',tags:['续命','快乐水']},
      {name:'蛋糕',emoji:'🍰',cal:'450kcal',tags:['甜点','治愈']},
      {name:'炸鸡',emoji:'🍗',cal:'600kcal',tags:['罪恶','快乐']},
      {name:'甜甜圈',emoji:'🍩',cal:'350kcal',tags:['甜食','拍照']},
      {name:'芝士披萨',emoji:'🍕',cal:'550kcal',tags:['分享','满足']},
      {name:'麻薯/大福',emoji:'🍡',cal:'250kcal',tags:['日式','软糯']},
      {name:'冰淇淋',emoji:'🍦',cal:'300kcal',tags:['夏天','快乐']},
      {name:'华夫饼',emoji:'🧇',cal:'400kcal',tags:['西式','香甜']}
    ],diet:[
      {name:'美式咖啡',emoji:'☕',cal:'5kcal',tags:['提神','零卡']},
      {name:'希腊酸奶+水果',emoji:'🫐',cal:'150kcal',tags:['高蛋白','益生菌']},
      {name:'坚果小把',emoji:'🥜',cal:'180kcal',tags:['优质脂肪','饱腹']},
      {name:'水果拼盘',emoji:'🍓',cal:'120kcal',tags:['维C','清爽']},
      {name:'黑巧克力',emoji:'🍫',cal:'150kcal',tags:['抗氧化','解馋']},
      {name:'无糖气泡水',emoji:'💧',cal:'0kcal',tags:['零卡','气泡']},
      {name:'燕麦杯',emoji:'🥣',cal:'200kcal',tags:['粗粮','饱腹']},
      {name:'蛋白棒',emoji:'💪',cal:'180kcal',tags:['增肌','方便']}
    ]}};

    var meal='lunch',diet=false,spinning=false,hist=[],ITEM_H=72;

    function getList(){return foods[meal][diet?'diet':'normal']}

    function switchMeal(m){
      meal=m;
      document.querySelectorAll('.segment-btn').forEach(function(b){b.classList.toggle('active',b.dataset.meal===m)});
      buildReel();
    }

    function toggleDiet(){
      diet=!diet;
      var btn=document.getElementById('dietBtn');
      btn.classList.toggle('diet-on',diet);
      btn.textContent=diet?'🥗 减肥模式':'减肥模式';
      var badge=document.getElementById('dietBadge');
      badge.classList.toggle('show',diet);
      buildReel();
    }

    function buildReel(){
      var list=getList(),reel=document.getElementById('reel');
      reel.textContent='';
      reel.style.transition='none';
      reel.style.transform='translateY(0)';
      // Build 5x copies for scrolling
      for(var r=0;r<5;r++){
        list.forEach(function(f){
          var item=document.createElement('div');
          item.className='slot-item';
          var emoji=document.createElement('div');
          emoji.className='item-emoji';emoji.textContent=f.emoji;
          var info=document.createElement('div');
          info.className='item-info';
          var name=document.createElement('div');
          name.className='item-name';name.textContent=f.name;
          var meta=document.createElement('div');
          meta.className='item-meta';meta.textContent=f.tags.join(' · ')+' · '+f.cal;
          info.appendChild(name);info.appendChild(meta);
          item.appendChild(emoji);item.appendChild(info);
          reel.appendChild(item);
        });
      }
    }

    function spin(){
      if(spinning)return;
      spinning=true;
      var btn=document.getElementById('spinBtn');
      btn.classList.add('spinning');
      btn.textContent='选择中...';
      document.getElementById('result').classList.remove('show');

      var list=getList();
      var winIdx=Math.floor(Math.random()*list.length);
      var reel=document.getElementById('reel');

      // Calculate scroll: 3 full cycles + land on winner, centered in highlight
      var totalItems=list.length;
      var cycles=3;
      var targetItem=cycles*totalItems+winIdx;
      // Center in the highlight (window is 280px, highlight is at 50%, item is 72px)
      var offset=targetItem*ITEM_H-(280/2-ITEM_H/2);

      reel.style.transition='transform 3s cubic-bezier(0.23,1,0.32,1)';
      reel.style.transform='translateY(-'+offset+'px)';

      setTimeout(function(){
        var food=list[winIdx];
        showResult(food);
        addHistory(food);
        spinning=false;
        btn.classList.remove('spinning');
        btn.textContent='再来一次';
      },3200);
    }

    function showResult(f){
      document.getElementById('resEmoji').textContent=f.emoji;
      document.getElementById('resName').textContent=f.name;
      var m={lunch:'午餐',dinner:'晚餐',snack:'下午茶'};
      document.getElementById('resDesc').textContent='今天'+m[meal]+'就决定是你了';
      var pills=document.getElementById('resPills');
      pills.textContent='';
      f.tags.forEach(function(t){
        var p=document.createElement('span');p.className='pill';p.textContent=t;pills.appendChild(p);
      });
      var cal=document.createElement('span');cal.className='pill green';cal.textContent=f.cal;pills.appendChild(cal);
      setTimeout(function(){document.getElementById('result').classList.add('show')},100);
    }

    function addHistory(f){
      hist.unshift(f);if(hist.length>10)hist.pop();
      document.getElementById('historyBox').style.display='';
      var list=document.getElementById('historyList');
      list.textContent='';
      hist.forEach(function(h){
        var chip=document.createElement('div');chip.className='history-chip';
        var em=document.createElement('span');em.className='chip-emoji';em.textContent=h.emoji;
        var nm=document.createElement('span');nm.className='chip-name';nm.textContent=h.name;
        chip.appendChild(em);chip.appendChild(nm);list.appendChild(chip);
      });
    }

    function share(){
      var f=hist[0];if(!f)return;
      var m={lunch:'午餐',dinner:'晚餐',snack:'下午茶'};
      var text='今天'+m[meal]+'吃 '+f.emoji+' '+f.name+'！\n命运之轮为我选的 → eat.asherzhou.com';
      if(navigator.share){navigator.share({title:'今天吃什么',text:text})}
      else if(navigator.clipboard){navigator.clipboard.writeText(text);alert('已复制到剪贴板！')}
    }

    buildReel();
  </script>
</body>
</html>
